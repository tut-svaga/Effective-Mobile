services:
  backend: 
    build:
      context: ./backend
    container_name: backend_app
    env_file:
      - .env
    expose:
      - "${BACK_EXPOSE}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
  nginx:
    build: 
      context: ./nginx
    container_name: nginx_app
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_CONT_PORT}"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    